  <body>
    <div id="root"></div>
    <script>
      // Immediate OAuth redirect - runs before React loads
      (function() {
        var liveUrl = 'https://app.nevorai.com';
        var currentUrl = window.location.href;
        var isPreviewUrl = currentUrl.includes('.lovable.app');
        var hasAuthToken = window.location.hash.includes('access_token');
        
        if (isPreviewUrl && hasAuthToken) {
          window.location.replace(liveUrl + '/dashboard' + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
